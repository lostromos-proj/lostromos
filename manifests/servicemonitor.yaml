---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: lostromos
  namespace: lostromos
  labels:
    app: lostromos
spec:
  namespaceSelector:
    matchNames:
      - lostromos
  selector:
    matchLabels:
      app: lostromos
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
