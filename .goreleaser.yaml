# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: lostromos
    main: ./cmd
    binary: lostromos
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=netgo,osusergo
    ldflags:
      - -extldflags '-static' -s -w
    goos:
      - linux
    goarch:
      - amd64

dockers_v2:
  - ids: [lostromos]
    dockerfile: Containerfile
    images:
      - ghcr.io/lostromos-proj/lostromos
    tags:
      - "{{ .Tag }}"
      - latest
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
    platforms:
      - linux/amd64

archives:
  - formats: [binary]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: |
    Container image:
    - ghcr.io/lostromos-proj/lostromos:{{ .Tag }}
    - ghcr.io/lostromos-proj/lostromos:latest
