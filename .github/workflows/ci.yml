name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: imranismail/setup-kustomize@v2

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Render manifests with kustomize
        run: |
          kustomize build manifests >/dev/null

      - name: Build and test
        run: |
          go test ./...

  release:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub releases on tag push
      packages: write   # push to GHCR on tag push
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for goreleaser changelog

      - name: Ensure tag commit is on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/main'; then
            echo "Tag commit is reachable from origin/main"
          else
            echo "Tag commit is not on origin/main; refusing release"
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: imranismail/setup-kustomize@v2

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/') && env.ACT != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: ${{ (startsWith(github.ref, 'refs/tags/') && env.ACT != 'true') && 'release --clean' || 'release --clean --snapshot' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Render release manifests
        if: startsWith(github.ref, 'refs/tags/') && env.ACT != 'true'
        run: |
          cp -R manifests manifests-release
          cd manifests-release
          kustomize edit set image CONTAINER_IMAGE=ghcr.io/lostromos-proj/lostromos:${GITHUB_REF_NAME}
          kustomize build . > ../manifests.yaml
          cd ..
          grep -q "image: ghcr.io/lostromos-proj/lostromos:${GITHUB_REF_NAME}" manifests.yaml

      - name: Upload manifests.yaml to GitHub release
        if: startsWith(github.ref, 'refs/tags/') && env.ACT != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" manifests.yaml --clobber
